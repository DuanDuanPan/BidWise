      - "_bmad-output/implementation-artifacts/prototypes/story-1-9/command-palette-overlay.png"
      - "_bmad-output/implementation-artifacts/prototypes/story-1-9/search-filter-state.png"
    primary_frames:
      - "Story 1-9 — 命令面板叠加层"
      - "Story 1-9 — 搜索结果分组"
      - "Story 1-9 — 自动保存提示"
    notes: "Cmd+K command palette overlay with fuzzy search. Covers Cmd+S auto-save toast."

