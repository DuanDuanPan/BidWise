    primary_frames:
      - "Story 1-7 — 三栏布局标准模式"
      - "Story 1-7 — 三栏布局紧凑模式"
    notes: "Workspace shell: left outline 240px + main min 600px + right sidebar 320px + status bar 32px."

  "1-9":
    derived_from_template: "_bmad-output/implementation-artifacts/prototypes/prototype.pen"
    pen_file: "_bmad-output/implementation-artifacts/prototypes/story-1-9.pen"
    reference_exports_dir: "_bmad-output/implementation-artifacts/prototypes/story-1-9/"
    reference_exports:
