      - "_bmad-output/implementation-artifacts/prototypes/story-1-5/cQWId.png"
      - "_bmad-output/implementation-artifacts/prototypes/story-1-5/xTWbW.png"
    primary_frames:
      - "Story 1.5 — 项目看板页面"
      - "Story 1.5 — 新建项目表单"
      - "Story 1.5 — 项目卡片组件"
    viewports:
