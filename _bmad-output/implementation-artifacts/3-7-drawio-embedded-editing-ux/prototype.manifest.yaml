notes: |-
  PNG 用于视觉对齐参考，.pen 用于结构与交互细节查阅。
  原型中的 lucide 图标与格式化按钮只作为视觉示意；实现必须遵循 story / ux-spec，复用现有 @ant-design/icons 或 shared icon 体系。
  重编辑触发以“双击缩略图或点击编辑按钮”为准；Alpha 阶段 iframe 固定高度 500px。
  编辑态截图中的保存 / 关闭按钮映射为 draw.io embed mode 原生 Save / Exit 控件；宿主层只实现容器、安全标识与预览态操作栏。
