name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Typecheck + Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bootstrap Python venv
        run: |
          python -m venv python/.venv
          python/.venv/bin/pip install -e './python[test]'

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit Test
        run: pnpm test:unit

  e2e:
    name: E2E Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bootstrap Python venv
        run: |
          python -m venv python/.venv
          python/.venv/bin/pip install -e './python[test]'

      - name: Install Playwright system deps
        run: npx playwright install --with-deps

      - name: Build app
        run: pnpm build

      - name: Run E2E tests
        run: xvfb-run --auto-servernum -- pnpm test:e2e
        env:
          ELECTRON_DISABLE_SANDBOX: 1

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            test-results/playwright/
            playwright-report/
          retention-days: 7
